<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ title or "Gerenciador de Loja" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/dashboard">Gerenciador</a>
    <div class="d-flex gap-2">
      <a class="btn btn-sm btn-outline-light" href="/products">Produtos</a>
      <a class="btn btn-sm btn-outline-light" href="/customers">Clientes</a>
      <a class="btn btn-sm btn-outline-light" href="/sales">Vendas</a>
        <a class="btn btn-sm btn-warning" href="/sales/new">Nova venda</a>
        <a class="btn btn-sm btn-outline-light" href="/orders">Pedidos</a>
<a class="btn btn-sm btn-warning" href="/orders/new">Novo pedido</a>

      <a class="btn btn-sm btn-outline-danger" href="/logout">Sair</a>
    </div>
  </div>
</nav>

<div class="container my-4">
  {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
  {% endif %}
  {% if success %}
    <div class="alert alert-success">{{ success }}</div>
  {% endif %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
