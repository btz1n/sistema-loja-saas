{% extends "base.html" %}

{% block public %}
<h2 class="h2">Criar Usuário (Admin)</h2>
<p class="muted">Cria um usuário para uma loja existente.</p>

<form method="post" action="/admin/create_user" class="form">
  <label class="label">Nome da Loja</label>
  <input class="input" name="store_name" required>

  <label class="label">Usuário</label>
  <input class="input" name="username" required>

  <label class="label">Senha</label>
  <input class="input" name="password" type="password" required>

  <button class="btn primary full" type="submit">Criar usuário</button>

  <div class="links">
    <a href="/login">Voltar para login</a>
  </div>
</form>
{% endblock %}
