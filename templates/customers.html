{% extends "base.html" %}
{% block content %}

<div class="topbar">
  <h1>Clientes</h1>
</div>

<div class="row">
  <div class="col card">
    <h1 style="font-size:16px; margin:0 0 10px 0;">Cadastrar cliente</h1>
    <form method="post" action="/customers/create">
      <label>Nome</label>
      <input class="input" name="name" required>

      <div style="margin-top:10px;">
        <label>Telefone</label>
        <input class="input" name="phone">
      </div>

      <div style="margin-top:10px;">
        <label>Endereço</label>
        <textarea class="input" name="address" rows="3"></textarea>
      </div>

      <div style="margin-top:12px;">
        <button class="btn primary full" type="submit">Salvar</button>
      </div>
    </form>
  </div>

  <div class="col card" style="flex:2;">
    <h1 style="font-size:16px; margin:0 0 10px 0;">Lista</h1>
    <table class="table">
      <thead>
        <tr>
          <th>Nome</th><th>Telefone</th><th>Endereço</th>
        </tr>
      </thead>
      <tbody>
      {% for c in customers %}
        <tr>
          <td>{{ c.name }}</td>
          <td>{{ c.phone }}</td>
          <td class="muted">{{ c.address }}</td>
        </tr>
      {% else %}
        <tr><td colspan="3" class="muted">Sem clientes.</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</div>

{% endblock %}
