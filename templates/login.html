{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="mb-3">Entrar</h4>
        <form method="post" action="/login">
          <div class="mb-2">
            <label class="form-label">Nome da Loja</label>
            <input class="form-control" name="store_name" placeholder="Ex: Loja Demo" required>
          </div>
          <div class="mb-2">
            <label class="form-label">Usuário</label>
            <input class="form-control" name="username" placeholder="admin" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Senha</label>
            <input class="form-control" type="password" name="password" placeholder="admin123" required>
          </div>
          <button class="btn btn-primary w-100">Entrar</button>
        </form>
        <hr>
        <p class="small text-muted mb-0">
          Primeiro acesso? Crie uma loja em <b>/admin/setup</b>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
