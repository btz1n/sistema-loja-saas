{% extends "base.html" %}

{% block public %}
<h2 class="h2">Resetar Senha (Admin)</h2>
<p class="muted">Troca a senha de um usuário em uma loja.</p>

<form method="post" action="/admin/reset_password" class="form">
  <label class="label">Nome da Loja</label>
  <input class="input" name="store_name" required>

  <label class="label">Usuário</label>
  <input class="input" name="username" required>

  <label class="label">Nova senha</label>
  <input class="input" name="new_password" type="password" required>

  <button class="btn primary full" type="submit">Resetar</button>

  <div class="links">
    <a href="/login">Voltar para login</a>
  </div>
</form>
{% endblock %}
