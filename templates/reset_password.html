{% extends "base.html" %}
{% block content %}
<div class="card">
  <h1 style="margin:0 0 6px 0;">Resetar senha</h1>
  <div class="muted" style="margin-bottom:12px;">Reseta senha de um usuário dentro de uma loja.</div>

  <form method="post" action="/admin/reset_password">
    <label>Nome da loja</label>
    <input class="input" name="store_name" required>

    <div style="margin-top:10px;">
      <label>Usuário</label>
      <input class="input" name="username" required>
    </div>

    <div style="margin-top:10px;">
      <label>Nova senha</label>
      <input class="input" name="new_password" type="password" required>
    </div>

    <div style="margin-top:12px;">
      <button class="btn primary full" type="submit">Resetar</button>
    </div>
  </form>
</div>
{% endblock %}
