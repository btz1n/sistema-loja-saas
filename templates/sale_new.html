{% extends "base.html" %}
{% block content %}
<h3>Nova venda</h3>

<div class="card shadow-sm">
  <div class="card-body">
    <form method="post" action="/sales/create_form">
      <div class="row g-2 mb-3">
        <div class="col-md-6">
          <label class="form-label">Cliente</label>
          <input class="form-control" name="customer_name" placeholder="Cliente avulso">
        </div>
        <div class="col-md-6">
          <label class="form-label">Pagamento</label>
          <select class="form-select" name="payment_method">
            <option value="dinheiro">Dinheiro</option>
            <option value="pix">PIX</option>
            <option value="cartao">Cartão</option>
          </select>
        </div>
      </div>

      <h5>Itens</h5>
      <p class="text-muted small">Selecione o produto e coloque a quantidade. Pode adicionar várias linhas.</p>

      {% for i in range(8) %}
      <div class="row g-2 mb-2">
        <div class="col-md-8">
          <select class="form-select" name="product_id">
            <option value="">-- selecione --</option>
            {% for p in products %}
              <option value="{{p.id}}">{{ p.name }} (R$ {{ "%.2f"|format(p.price) }} | estoque: {{p.stock}})</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <input class="form-control" name="qty" type="number" min="0" placeholder="Qtd">
        </div>
      </div>
      {% endfor %}

      <button class="btn btn-success w-100 mt-3">Finalizar venda</button>
    </form>
  </div>
</div>
{% endblock %}
