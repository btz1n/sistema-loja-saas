{% extends "base.html" %}
{% block content %}

<div class="topbar">
  <h1>Nova Venda</h1>
  <a class="btn" href="/sales">Voltar</a>
</div>

<div class="card">
  <form method="post" action="/sales/create" onsubmit="return buildItemsJson('items_json')">
    <label>Cliente (opcional)</label>
    <input class="input" name="customer_name" placeholder="Nome do cliente">

    <input type="hidden" name="items_json" id="items_json">

    <div style="margin-top:14px;">
      <div class="topbar">
        <h1 style="font-size:16px;margin:0;">Itens</h1>
        <button class="btn" type="button" onclick="addRow()">+ Adicionar item</button>
      </div>

      <table class="table" id="itemsTable">
        <thead>
          <tr>
            <th>Produto</th><th>Qtd</th><th>Preço</th><th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div style="margin-top:14px;">
      <button class="btn primary full" type="submit">Criar Venda</button>
    </div>
  </form>
</div>

<script>
function rowTemplate(){
  return `
    <tr>
      <td><input class="input" name="product_name" placeholder="Ex: Camisa GG" required></td>
      <td style="width:90px;"><input class="input" name="qty" type="number" min="1" value="1" required></td>
      <td style="width:130px;"><input class="input" name="price" type="number" step="0.01" min="0" value="0" required></td>
      <td style="width:90px;"><button class="btn danger" type="button" onclick="this.closest('tr').remove()">Remover</button></td>
    </tr>
  `;
}
function addRow(){
  document.querySelector("#itemsTable tbody").insertAdjacentHTML("beforeend", rowTemplate());
}
function buildItemsJson(hiddenId){
  const rows = Array.from(document.querySelectorAll("#itemsTable tbody tr"));
  const items = rows.map(r => {
    const pname = r.querySelector('input[name="product_name"]').value.trim();
    const qty = parseInt(r.querySelector('input[name="qty"]').value || "0", 10);
    const price = parseFloat(r.querySelector('input[name="price"]').value || "0");
    return {product_name: pname, qty: qty, price: price};
  }).filter(it => it.product_name && it.qty > 0);

  if(items.length === 0){
    alert("Adicione ao menos 1 item.");
    return false;
  }
  document.getElementById(hiddenId).value = JSON.stringify(items);
  return true;
}
addRow();
</script>

{% endblock %}
