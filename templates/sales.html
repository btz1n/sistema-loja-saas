{% extends "base.html" %}
{% block content %}

<div class="topbar">
  <h1>Vendas</h1>
  <a class="btn primary" href="/sales/new">+ Nova venda</a>
</div>

<div class="card">
  <table class="table">
    <thead>
      <tr>
        <th>ID</th><th>Cliente</th><th>Data</th><th>Total</th><th>Ações</th>
      </tr>
    </thead>
    <tbody>
      {% for s in sales %}
      <tr>
        <td>{{ s.id }}</td>
        <td>{{ s.customer_name }}</td>
        <td>{{ s.created_at }}</td>
        <td>R$ {{ "%.2f"|format(s.total) }}</td>
        <td><a class="btn" href="/sales/{{ s.id }}">Abrir</a></td>
      </tr>
      {% else %}
      <tr><td colspan="5" class="muted">Sem vendas.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
